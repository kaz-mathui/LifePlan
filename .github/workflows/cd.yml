name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: lifeplan-f73ae
  GCP_REGION: asia-northeast1
  AR_REPO: lifeplan
  BACKEND_IMAGE: asia-northeast1-docker.pkg.dev/lifeplan-f73ae/lifeplan/backend
  FRONTEND_IMAGE: asia-northeast1-docker.pkg.dev/lifeplan-f73ae/lifeplan/frontend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-northeast1-docker.pkg.dev --quiet

      - name: Set image tag
        run: echo "IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build and push backend image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.BACKEND_IMAGE }}:latest \
            -f backend/Dockerfile .
          docker push ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.BACKEND_IMAGE }}:latest

      - name: Build and push frontend image
        run: |
          docker build --platform linux/amd64 \
            -t ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            -t ${{ env.FRONTEND_IMAGE }}:latest \
            -f frontend/Dockerfile .
          docker push ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
          docker push ${{ env.FRONTEND_IMAGE }}:latest
        env:
          REACT_APP_BACKEND_URL: ${{ secrets.REACT_APP_BACKEND_URL }}

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy lifeplan-backend \
            --image ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 3001 \
            --set-env-vars "NODE_ENV=production,CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" \
            --set-secrets "SERVICE_ACCOUNT_KEY=firebase-service-account:latest" \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy lifeplan-frontend \
            --image ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 80 \
            --memory 128Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 2
